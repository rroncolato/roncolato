<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Área do Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-white: #FFFFFF;
            --color-black: #1A1A1A;
            --color-yellow: #F5C518;
            --color-gray-50: #F9F9F9;
            --color-gray-100: #F3F3F3;
            --color-gray-200: #E8E8E8;
            --color-gray-500: #909090;
            --color-gray-600: #666666;
            --color-error: #EF4444;
            --color-success: #10B981;
            --font-family: 'Jost', 'Segoe UI', sans-serif;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--color-yellow) 0%, rgba(245, 197, 24, 0.8) 100%);
        }

        .login-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .login-box {
            background: var(--color-white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: var(--space-xl) var(--space-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .logo {
            font-size: 48px;
            margin-bottom: var(--space-md);
            font-weight: 700;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-black);
            margin-bottom: var(--space-sm);
        }

        .subtitle {
            font-size: 14px;
            color: var(--color-gray-600);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: var(--space-lg);
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--color-black);
            margin-bottom: var(--space-sm);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px var(--space-md);
            border: 1px solid var(--color-gray-200);
            border-radius: 8px;
            font-size: 16px;
            transition: all 200ms ease-out;
            font-family: var(--font-family);
        }

        input:focus {
            outline: none;
            border-color: var(--color-yellow);
            box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.1);
        }

        input::placeholder {
            color: var(--color-gray-500);
        }

        .form-hint {
            font-size: 12px;
            color: var(--color-gray-600);
            margin-top: var(--space-sm);
        }

        /* ===== BUTTON ===== */
        .btn-submit {
            width: 100%;
            padding: 12px var(--space-md);
            background: var(--color-yellow);
            color: var(--color-black);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: var(--font-family);
            cursor: pointer;
            transition: all 200ms ease-out;
            margin-top: var(--space-lg);
        }

        .btn-submit:hover {
            background: #FFD700;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== MESSAGES ===== */
        .message {
            padding: var(--space-md);
            border-radius: 8px;
            margin-bottom: var(--space-lg);
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #DC2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .message.info {
            background: rgba(245, 197, 24, 0.1);
            color: #B8860B;
            border: 1px solid rgba(245, 197, 24, 0.3);
        }

        /* ===== FOOTER ===== */
        .login-footer {
            margin-top: var(--space-xl);
            padding-top: var(--space-lg);
            border-top: 1px solid var(--color-gray-200);
            text-align: center;
            font-size: 13px;
            color: var(--color-gray-600);
        }

        .login-footer a {
            color: var(--color-yellow);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* ===== SPINNER ===== */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border-top-color: var(--color-black);
            animation: spin 0.8s linear infinite;
            margin-right: var(--space-sm);
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-box {
                padding: var(--space-lg) var(--space-md);
            }

            .title {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- HEADER -->
            <div class="login-header">
                <div class="logo">◆</div>
                <h1 class="title">Área do Cliente</h1>
                <p class="subtitle">Acompanhe seus projetos em tempo real</p>
            </div>

            <!-- MESSAGE -->
            <div class="message" id="message"></div>

            <!-- FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="seu.email@example.com"
                        required
                        autofocus
                    >
                    <p class="form-hint">Seu e-mail cadastrado na base de clientes</p>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Acessar Dashboard
                </button>
            </form>

            <!-- FOOTER -->
            <div class="login-footer">
                💡 Sem acesso? <a href="javascript:void(0)" onclick="showContactInfo()">Entre em contato</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/customer';
        const TOKEN_KEY = 'customer_token';

        async function handleLogin(event) {
            event.preventDefault();

            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Verificando...';

                const payload = {
                    email: document.getElementById('email').value.trim()
                };

                const response = await fetch(`${API_BASE}/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    showMessage('Bem-vindo! Redirecionando...', 'success');
                    setTimeout(() => {
                        window.location.href = '/customer/dashboard.html';
                    }, 500);
                } else {
                    showMessage(
                        data.message || 'E-mail não encontrado. Verifique seus dados e tente novamente.',
                        'error'
                    );
                }
            } catch (error) {
                console.error('Erro:', error);
                showMessage('Erro ao conectar ao servidor. Tente novamente.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function showMessage(message, type = 'info') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message show ${type}`;
            messageEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showContactInfo() {
            alert('Entre em contato conosco:\nE-mail: contato@roncolato.com\nWhatsApp: (00) 9999-9999');
        }

        // Redirecionar se já tem token
        window.addEventListener('load', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                window.location.href = '/customer/dashboard.html';
            }
        });
    </script>
</body>
</html>
