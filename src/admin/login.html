<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Roncolato</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --k: #0A0A0A;
      --w: #F0F0EB;
      --y: #F5C518;
      --g1: #111;
      --g2: #1a1a1a;
      --g3: #242424;
      --g4: #404040;
      --g5: #7a7a7a;
      --ease2: cubic-bezier(.76,0,.24,1);
    }

    html, body {
      height: 100%;
      background: var(--k);
      color: var(--w);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* GRAIN */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* CUSTOM CURSOR */
    @media(pointer:fine) {
      body { cursor: none; }
      #cur {
        position: fixed; z-index: 9999; pointer-events: none;
        width: 8px; height: 8px; background: var(--y); border-radius: 50%;
        transform: translate(-50%,-50%);
        transition: width .4s var(--ease2), height .4s var(--ease2);
        mix-blend-mode: difference;
      }
      #cur.big { width: 48px; height: 48px; }
    }

    /* LAYOUT */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── PAINEL ESQUERDO ── */
    .left {
      background: var(--g1);
      border-right: 1px solid var(--g2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 64px;
      position: relative;
      overflow: hidden;
    }

    /* Linha amarela vertical */
    .left::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 2px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--y) 40%, var(--y) 60%, transparent);
    }

    /* Círculo decorativo */
    .deco-circle {
      position: absolute;
      bottom: -120px; left: -80px;
      width: 480px; height: 480px;
      border-radius: 50%;
      border: 1px solid rgba(245,197,24,.06);
      pointer-events: none;
    }
    .deco-circle::before {
      content: '';
      position: absolute;
      inset: 60px;
      border-radius: 50%;
      border: 1px solid rgba(245,197,24,.04);
    }

    /* Letras decorativas de fundo */
    .deco-letters {
      position: absolute;
      bottom: -16px; right: -8px;
      font-size: clamp(100px, 14vw, 200px);
      font-weight: 900;
      letter-spacing: -.06em;
      color: rgba(255,255,255,.018);
      text-transform: uppercase;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .left-top { position: relative; z-index: 1; }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 72px;
    }

    .logo-wrap img {
      height: 22px;
      display: block;
    }

    .admin-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--k);
      background: var(--y);
      padding: 3px 10px;
    }

    .left-headline {
      font-size: clamp(36px, 4vw, 56px);
      font-weight: 900;
      color: var(--w);
      line-height: .92;
      letter-spacing: -.04em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .left-headline em { font-style: normal; color: var(--y); }

    .left-desc {
      font-size: 14px;
      color: var(--g5);
      line-height: 1.8;
      max-width: 300px;
    }

    .left-bottom {
      position: relative;
      z-index: 1;
    }

    .left-meta {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--g4);
    }

    /* ── PAINEL DIREITO ── */
    .right {
      background: var(--k);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 64px;
    }

    .form-wrap {
      width: 100%;
      max-width: 360px;
    }

    .form-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--y);
      margin-bottom: 20px;
    }
    .form-eyebrow::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--y);
    }

    .form-title {
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 900;
      color: var(--w);
      letter-spacing: -.04em;
      text-transform: uppercase;
      line-height: .92;
      margin-bottom: 12px;
    }

    .form-sub {
      font-size: 13px;
      color: var(--g5);
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--g4);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--g1) !important;
      border: 1px solid var(--g2);
      border-bottom: 1px solid var(--g3);
      color: var(--w) !important;
      -webkit-text-fill-color: var(--w) !important;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px var(--g1) inset !important;
      -webkit-text-fill-color: var(--w) !important;
    }
    .field input::placeholder { color: var(--g3) !important; -webkit-text-fill-color: var(--g3) !important; }
    .field input:focus { border-color: var(--y); }

    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 15px 24px;
      background: var(--y);
      color: var(--k);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .2s var(--ease2), box-shadow .2s;
    }
    .btn-submit:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(245,197,24,.25);
    }
    .btn-submit:active { transform: translateY(0); box-shadow: none; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      border-left: 2px solid;
    }
    .msg.error { background: rgba(239,68,68,.08); color: #fca5a5; border-color: #ef4444; }
    .msg.success { background: rgba(16,185,129,.08); color: #6ee7b7; border-color: #10b981; }

    .form-footer {
      margin-top: 32px;
      font-size: 10px;
      color: var(--g4);
      letter-spacing: .06em;
      text-align: center;
    }

    /* DIVISOR */
    .divider {
      height: 1px;
      background: var(--g2);
      margin: 32px 0;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .left { display: none; }
      .right { padding: 48px 32px; }
    }

    @media (max-width: 480px) {
      .right { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div id="cur"></div>

<div class="page">

  <!-- ESQUERDO — BRAND -->
  <div class="left">
    <div class="left-top">
      <div class="logo-wrap">
        <img src="/assets/IMG/roncolato-branco-horizontal.png" alt="Roncolato">
        <span class="admin-badge">Admin</span>
      </div>

      <h2 class="left-headline">
        Imagem<br>que <em>gera</em><br>resultado.
      </h2>

      <p class="left-desc">
        Painel de gerenciamento de conteúdo. Acesso restrito ao administrador.
      </p>
    </div>

    <div class="left-bottom">
      <p class="left-meta">Fotografia Corporativa · Goiânia-GO</p>
    </div>

    <div class="deco-circle"></div>
    <div class="deco-letters">RR</div>
  </div>

  <!-- DIREITO — FORM -->
  <div class="right">
    <div class="form-wrap">

      <p class="form-eyebrow">Área Restrita</p>
      <h1 class="form-title">Bem-vindo<br>de volta.</h1>
      <p class="form-sub">Entre com suas credenciais para acessar o painel.</p>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required placeholder="roncolato" autocomplete="username">
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Entrar no Painel →</button>

        <div class="msg error" id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>
      </form>

      <div class="divider"></div>
      <p class="form-footer">© 2025 Rodrigo Roncolato — Todos os direitos reservados</p>

    </div>
  </div>

</div>

<script>
  // Cursor
  const cur = document.getElementById('cur');
  if (cur && window.matchMedia('(pointer:fine)').matches) {
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('big'));
      el.addEventListener('mouseleave', () => cur.classList.remove('big'));
    });
  }

  // Login
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if (!username || !password) {
      errorMsg.textContent = 'Preencha usuário e senha';
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';

    try {
      const response = await fetch('/api/admin/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (!response.ok) throw new Error(data.error || 'Credenciais inválidas');

      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', data.username || username);

      successMsg.textContent = '✓ Login realizado — redirecionando...';
      successMsg.style.display = 'block';

      setTimeout(() => {
        window.location.href = '/admin/dashboard.html';
      }, 800);

    } catch (error) {
      errorMsg.textContent = error.message || 'Erro ao fazer login';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar no Painel →';
    }
  });
</script>
</body>
</html>
