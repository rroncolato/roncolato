<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1412"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d4956a"/>
      <stop offset="100%" stop-color="#b5703f"/>
    </radialGradient>
    <radialGradient id="toothWhite" cx="35%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="50%" stop-color="#ede8de"/>
      <stop offset="100%" stop-color="#d8d2c4"/>
    </radialGradient>
    <radialGradient id="toothSheen" cx="30%" cy="10%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Vinheta -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.65)"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#vignette)"/>

  <!-- Brilho dourado sutil no fundo (resultado premium) -->
  <radialGradient id="goldGlow" cx="50%" cy="65%" r="35%">
    <stop offset="0%" stop-color="rgba(184,148,90,0.08)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#goldGlow)"/>

  <!-- Label DEPOIS -->
  <rect x="20" y="20" width="100" height="32" rx="2" fill="rgba(184,148,90,0.18)" stroke="rgba(184,148,90,0.3)" stroke-width="1"/>
  <text x="70" y="41" font-family="Montserrat, sans-serif" font-size="11" fill="#CFA96E" text-anchor="middle" letter-spacing="3">DEPOIS</text>

  <!-- Rosto -->
  <ellipse cx="400" cy="270" rx="210" ry="260" fill="url(#skinGrad)" filter="url(#shadow)"/>

  <!-- Sombras do rosto -->
  <ellipse cx="230" cy="300" rx="50" ry="80" fill="rgba(0,0,0,0.12)" filter="url(#softBlur)"/>
  <ellipse cx="570" cy="300" rx="50" ry="80" fill="rgba(0,0,0,0.12)" filter="url(#softBlur)"/>

  <!-- Nariz -->
  <ellipse cx="400" cy="310" rx="22" ry="16" fill="rgba(0,0,0,0.08)"/>
  <ellipse cx="383" cy="320" rx="10" ry="7" fill="rgba(0,0,0,0.1)"/>
  <ellipse cx="417" cy="320" rx="10" ry="7" fill="rgba(0,0,0,0.1)"/>

  <!-- Olhos — mais expressivos (sorrindo) -->
  <ellipse cx="330" cy="210" rx="32" ry="15" fill="#1a0a05"/>
  <ellipse cx="470" cy="210" rx="32" ry="15" fill="#1a0a05"/>
  <ellipse cx="327" cy="207" rx="11" ry="9" fill="#3d2010"/>
  <ellipse cx="467" cy="207" rx="11" ry="9" fill="#3d2010"/>
  <circle cx="333" cy="205" r="4.5" fill="#111"/>
  <circle cx="473" cy="205" r="4.5" fill="#111"/>
  <circle cx="336" cy="202" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="476" cy="202" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Linha de sorriso nos olhos -->
  <path d="M300 220 Q330 227 360 220" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
  <path d="M440 220 Q470 227 500 220" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>

  <!-- Sobrancelhas -->
  <path d="M305 190 Q330 178 355 184" stroke="#4a2810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M445 184 Q470 178 495 190" stroke="#4a2810" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Maçãs do rosto levantadas (sorriso) -->
  <ellipse cx="272" cy="330" rx="42" ry="28" fill="rgba(200,100,70,0.18)" filter="url(#softBlur)"/>
  <ellipse cx="528" cy="330" rx="42" ry="28" fill="rgba(200,100,70,0.18)" filter="url(#softBlur)"/>

  <!-- Boca sorrindo mais aberta -->
  <path d="M252 368 Q320 345 400 348 Q480 345 548 368 Q510 420 400 428 Q290 420 252 368Z" fill="#7a2820"/>
  <path d="M252 368 Q320 352 400 355 Q480 352 548 368" fill="#9a3828" stroke="none"/>
  <!-- Lábio superior destaque -->
  <path d="M340 350 Q370 344 400 346 Q430 344 460 350" stroke="rgba(255,150,100,0.3)" stroke-width="2" fill="none"/>

  <!-- Cavidade -->
  <ellipse cx="400" cy="390" rx="165" ry="58" fill="#120806"/>

  <!-- Dentes após tratamento — brancos, alinhados, uniformes -->
  <!-- Reflexo de luz global nos dentes -->
  <defs>
    <clipPath id="teethClip">
      <ellipse cx="400" cy="390" rx="162" ry="55"/>
    </clipPath>
  </defs>

  <g clip-path="url(#teethClip)">
    <!-- Dente 1 -->
    <rect x="252" y="365" width="28" height="50" rx="4" fill="url(#toothWhite)"/>
    <rect x="254" y="365" width="12" height="20" rx="2" fill="url(#toothSheen)" opacity="0.7"/>
    <line x1="280" y1="365" x2="280" y2="415" stroke="rgba(180,160,120,0.25)" stroke-width="1"/>

    <!-- Dente 2 -->
    <rect x="282" y="360" width="32" height="55" rx="4" fill="url(#toothWhite)"/>
    <rect x="284" y="360" width="14" height="22" rx="2" fill="url(#toothSheen)" opacity="0.75"/>
    <line x1="314" y1="360" x2="314" y2="415" stroke="rgba(180,160,120,0.25)" stroke-width="1"/>

    <!-- Dente 3 incisivo central -->
    <rect x="316" y="356" width="36" height="60" rx="4" fill="url(#toothWhite)"/>
    <rect x="318" y="356" width="16" height="24" rx="2" fill="url(#toothSheen)" opacity="0.8"/>
    <line x1="352" y1="356" x2="352" y2="416" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 4 incisivo central direito -->
    <rect x="354" y="356" width="36" height="60" rx="4" fill="url(#toothWhite)"/>
    <rect x="356" y="356" width="16" height="24" rx="2" fill="url(#toothSheen)" opacity="0.8"/>
    <line x1="390" y1="356" x2="390" y2="416" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 5 -->
    <rect x="392" y="356" width="36" height="60" rx="4" fill="url(#toothWhite)"/>
    <rect x="394" y="356" width="16" height="24" rx="2" fill="url(#toothSheen)" opacity="0.8"/>
    <line x1="428" y1="356" x2="428" y2="416" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 6 -->
    <rect x="430" y="356" width="36" height="60" rx="4" fill="url(#toothWhite)"/>
    <rect x="432" y="356" width="16" height="24" rx="2" fill="url(#toothSheen)" opacity="0.8"/>
    <line x1="466" y1="356" x2="466" y2="416" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 7 -->
    <rect x="468" y="360" width="32" height="55" rx="4" fill="url(#toothWhite)"/>
    <rect x="470" y="360" width="14" height="22" rx="2" fill="url(#toothSheen)" opacity="0.75"/>
    <line x1="500" y1="360" x2="500" y2="415" stroke="rgba(180,160,120,0.25)" stroke-width="1"/>

    <!-- Dente 8 -->
    <rect x="502" y="365" width="28" height="50" rx="4" fill="url(#toothWhite)"/>
    <rect x="504" y="365" width="12" height="20" rx="2" fill="url(#toothSheen)" opacity="0.7"/>

    <!-- Reflexo global nos dentes (brilho de porcelana) -->
    <ellipse cx="400" cy="370" rx="145" ry="12" fill="rgba(255,255,255,0.08)" filter="url(#softBlur)"/>
  </g>

  <!-- Sombra embaixo dos dentes superiores -->
  <ellipse cx="400" cy="418" rx="148" ry="14" fill="rgba(0,0,0,0.35)"/>

  <!-- Cantos da boca com sorriso -->
  <path d="M247 370 Q242 385 248 400" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
  <path d="M553 370 Q558 385 552 400" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>

  <!-- Linha dourada sutil nos dentes (efeito porcelana premium) -->
  <line x1="252" y1="416" x2="548" y2="416" stroke="rgba(184,148,90,0.12)" stroke-width="1"/>

  <!-- Texto descritivo -->
  <rect x="50" y="520" width="700" height="56" rx="4" fill="rgba(184,148,90,0.06)" stroke="rgba(184,148,90,0.2)" stroke-width="1"/>
  <text x="400" y="543" font-family="Montserrat, sans-serif" font-size="10" fill="#B8945A" text-anchor="middle" letter-spacing="2">RESULTADO FINAL</text>
  <text x="400" y="562" font-family="Montserrat, sans-serif" font-size="12" fill="#C4C0B4" text-anchor="middle">10 lentes de contato E.max — uniformidade, cor e translucidez naturais</text>
</svg>
