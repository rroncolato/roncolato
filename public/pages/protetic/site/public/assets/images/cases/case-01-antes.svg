<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1412"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#d4956a"/>
      <stop offset="100%" stop-color="#b5703f"/>
    </radialGradient>
    <radialGradient id="toothGrad1" cx="40%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#c8b89a"/>
      <stop offset="60%" stop-color="#a89070"/>
      <stop offset="100%" stop-color="#8a6f4a"/>
    </radialGradient>
    <radialGradient id="toothGrad2" cx="40%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#b8a882"/>
      <stop offset="60%" stop-color="#988060"/>
      <stop offset="100%" stop-color="#7a5f3a"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <clipPath id="mouthClip">
      <ellipse cx="400" cy="390" rx="170" ry="70"/>
    </clipPath>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Vinheta -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
  </radialGradient>
  <rect width="800" height="600" fill="url(#vignette)"/>

  <!-- Label ANTES -->
  <rect x="20" y="20" width="90" height="32" rx="2" fill="rgba(0,0,0,0.65)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="65" y="41" font-family="Montserrat, sans-serif" font-size="11" fill="#7A7A72" text-anchor="middle" letter-spacing="3">ANTES</text>

  <!-- Rosto — forma oval -->
  <ellipse cx="400" cy="270" rx="210" ry="260" fill="url(#skinGrad)" filter="url(#shadow)"/>

  <!-- Sombras do rosto -->
  <ellipse cx="230" cy="300" rx="50" ry="80" fill="rgba(0,0,0,0.15)" filter="url(#softBlur)"/>
  <ellipse cx="570" cy="300" rx="50" ry="80" fill="rgba(0,0,0,0.15)" filter="url(#softBlur)"/>

  <!-- Nariz simples -->
  <ellipse cx="400" cy="310" rx="22" ry="16" fill="rgba(0,0,0,0.1)"/>
  <ellipse cx="383" cy="320" rx="10" ry="7" fill="rgba(0,0,0,0.12)"/>
  <ellipse cx="417" cy="320" rx="10" ry="7" fill="rgba(0,0,0,0.12)"/>

  <!-- Olhos -->
  <ellipse cx="330" cy="210" rx="30" ry="16" fill="#1a0a05"/>
  <ellipse cx="470" cy="210" rx="30" ry="16" fill="#1a0a05"/>
  <ellipse cx="327" cy="207" rx="10" ry="8" fill="#3d2010"/>
  <ellipse cx="467" cy="207" rx="10" ry="8" fill="#3d2010"/>
  <circle cx="333" cy="205" r="4" fill="#111"/>
  <circle cx="473" cy="205" r="4" fill="#111"/>
  <circle cx="335" cy="203" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="475" cy="203" r="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Sobrancelhas -->
  <path d="M305 192 Q330 180 355 186" stroke="#4a2810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M445 186 Q470 180 495 192" stroke="#4a2810" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Boca — lábios -->
  <path d="M260 375 Q320 355 400 358 Q480 355 540 375 Q480 410 400 415 Q320 410 260 375Z" fill="#8b3a2a"/>
  <path d="M260 375 Q320 362 400 365 Q480 362 540 375" fill="#a04535" stroke="none"/>

  <!-- Abertura bucal com dentes amarelados/manchados -->
  <ellipse cx="400" cy="390" rx="155" ry="55" fill="#1a0f0a"/>

  <!-- Dentes - linha superior (amarelados, manchados, irregulares) -->
  <!-- Dente 1 - incisivo central esquerdo (manchado, escurecido) -->
  <path d="M285 370 Q295 365 308 367 L310 415 Q295 418 283 415 Z" fill="url(#toothGrad1)" rx="3"/>
  <path d="M290 380 Q295 375 305 377" stroke="#6a5030" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Dente 2 - incisivo central (girado, amarelado) -->
  <path d="M310 366 Q322 360 335 363 L336 415 Q321 418 309 415 Z" fill="url(#toothGrad2)" rx="2"/>
  <!-- mancha escura -->
  <ellipse cx="322" cy="392" rx="5" ry="8" fill="rgba(80,50,10,0.4)"/>

  <!-- Dente 3 - central direito (com diastema) -->
  <path d="M340 363 Q353 358 366 361 L367 415 Q352 418 339 415 Z" fill="url(#toothGrad1)"/>

  <!-- gap/diastema -->

  <!-- Dente 4 -->
  <path d="M372 361 Q385 357 398 360 L399 415 Q384 418 371 415 Z" fill="url(#toothGrad2)"/>
  <path d="M378 370 Q385 365 394 368" stroke="#5a4020" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Dente 5 -->
  <path d="M401 360 Q414 357 427 360 L428 415 Q413 418 400 415 Z" fill="url(#toothGrad1)"/>
  <ellipse cx="413" cy="385" rx="4" ry="6" fill="rgba(60,35,5,0.35)"/>

  <!-- Dente 6 -->
  <path d="M430 360 Q443 357 456 361 L457 415 Q442 418 429 415 Z" fill="url(#toothGrad2)"/>

  <!-- Dente 7 - lateral (menor, irregular) -->
  <path d="M458 362 Q469 359 479 363 L480 415 Q468 418 457 415 Z" fill="url(#toothGrad1)"/>

  <!-- Dente 8 - canino ponta para fora -->
  <path d="M481 364 Q491 358 500 364 L503 415 Q491 419 480 415 Z" fill="url(#toothGrad2)"/>
  <!-- mancha cervical escura -->
  <path d="M483 364 Q491 362 499 365 L500 373 Q491 371 482 373 Z" fill="rgba(50,25,5,0.5)"/>

  <!-- Dente 9 - canino -->
  <path d="M503 365 Q513 360 522 365 L523 415 Q512 419 502 415 Z" fill="url(#toothGrad1)"/>

  <!-- Sombra na cavidade -->
  <ellipse cx="400" cy="418" rx="140" ry="18" fill="rgba(0,0,0,0.4)"/>

  <!-- Linha do lábio inferior -->
  <path d="M260 375 Q400 385 540 375" stroke="rgba(0,0,0,0.2)" stroke-width="1" fill="none"/>

  <!-- Detalhe rugas cantos da boca -->
  <path d="M253 372 Q248 385 252 395" stroke="rgba(0,0,0,0.2)" stroke-width="2" fill="none"/>
  <path d="M547 372 Q552 385 548 395" stroke="rgba(0,0,0,0.2)" stroke-width="2" fill="none"/>

  <!-- Texto descritivo -->
  <rect x="50" y="520" width="700" height="56" rx="4" fill="rgba(0,0,0,0.45)" stroke="rgba(184,148,90,0.15)" stroke-width="1"/>
  <text x="400" y="543" font-family="Montserrat, sans-serif" font-size="10" fill="#7A7A72" text-anchor="middle" letter-spacing="2">SITUAÇÃO INICIAL</text>
  <text x="400" y="562" font-family="Montserrat, sans-serif" font-size="12" fill="#C4C0B4" text-anchor="middle">Manchamento, irregularidades e desgaste — antes do tratamento Protetic</text>
</svg>
