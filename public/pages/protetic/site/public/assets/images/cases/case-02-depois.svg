<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141010"/>
      <stop offset="100%" stop-color="#060404"/>
    </radialGradient>
    <radialGradient id="gumGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#d06070"/>
      <stop offset="100%" stop-color="#9a3040"/>
    </radialGradient>
    <radialGradient id="tw" cx="32%" cy="8%" r="85%">
      <stop offset="0%" stop-color="#f6f3ed"/>
      <stop offset="55%" stop-color="#eee8da"/>
      <stop offset="100%" stop-color="#d8d0be"/>
    </radialGradient>
    <radialGradient id="sheen" cx="28%" cy="5%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.6)"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <clipPath id="tc"><ellipse cx="400" cy="260" rx="238" ry="60"/></clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#vig)"/>

  <!-- Brilho dourado -->
  <radialGradient id="gold" cx="50%" cy="60%" r="40%">
    <stop offset="0%" stop-color="rgba(184,148,90,0.07)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#gold)"/>

  <!-- Label -->
  <rect x="20" y="20" width="100" height="30" rx="2" fill="rgba(184,148,90,0.18)" stroke="rgba(184,148,90,0.3)" stroke-width="1"/>
  <text x="70" y="39" font-family="Montserrat, sans-serif" font-size="11" fill="#CFA96E" text-anchor="middle" letter-spacing="3">DEPOIS</text>

  <!-- Lábios sorrindo -->
  <path d="M115 215 Q400 170 685 215 Q650 315 400 338 Q150 315 115 215Z" fill="#6a1e18" filter="url(#sh)"/>
  <path d="M115 215 Q400 190 685 215" fill="#8a2a22"/>
  <!-- detalhe lábio superior -->
  <path d="M330 185 Q365 177 400 179 Q435 177 470 185" stroke="rgba(200,100,80,0.3)" stroke-width="2" fill="none"/>

  <!-- Abertura -->
  <ellipse cx="400" cy="265" rx="248" ry="65" fill="#080303"/>

  <!-- Gengiva saudável -->
  <ellipse cx="400" cy="220" rx="242" ry="32" fill="url(#gumGrad)"/>

  <!-- Dentes brancos, alinhados, sem diastema -->
  <g clip-path="url(#tc)">
    <!-- Dente 1 -->
    <rect x="168" y="214" width="30" height="52" rx="4" fill="url(#tw)"/>
    <rect x="170" y="214" width="13" height="22" rx="2" fill="url(#sheen)" opacity="0.65"/>
    <line x1="198" y1="214" x2="198" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 2 -->
    <rect x="200" y="209" width="34" height="57" rx="4" fill="url(#tw)"/>
    <rect x="202" y="209" width="15" height="24" rx="2" fill="url(#sheen)" opacity="0.7"/>
    <line x1="234" y1="209" x2="234" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 3 central esquerdo -->
    <rect x="236" y="205" width="38" height="61" rx="5" fill="url(#tw)"/>
    <rect x="238" y="205" width="17" height="26" rx="2" fill="url(#sheen)" opacity="0.75"/>
    <line x1="274" y1="205" x2="274" y2="266" stroke="rgba(180,160,120,0.18)" stroke-width="1"/>

    <!-- Dente 4 central direito - sem diastema -->
    <rect x="276" y="205" width="38" height="61" rx="5" fill="url(#tw)"/>
    <rect x="278" y="205" width="17" height="26" rx="2" fill="url(#sheen)" opacity="0.75"/>
    <line x1="314" y1="205" x2="314" y2="266" stroke="rgba(180,160,120,0.18)" stroke-width="1"/>

    <!-- Dente 5 -->
    <rect x="316" y="205" width="38" height="61" rx="5" fill="url(#tw)"/>
    <rect x="318" y="205" width="17" height="26" rx="2" fill="url(#sheen)" opacity="0.75"/>
    <line x1="354" y1="205" x2="354" y2="266" stroke="rgba(180,160,120,0.18)" stroke-width="1"/>

    <!-- Dente 6 -->
    <rect x="356" y="205" width="38" height="61" rx="5" fill="url(#tw)"/>
    <rect x="358" y="205" width="17" height="26" rx="2" fill="url(#sheen)" opacity="0.75"/>
    <line x1="394" y1="205" x2="394" y2="266" stroke="rgba(180,160,120,0.18)" stroke-width="1"/>

    <!-- Dente 7 -->
    <rect x="396" y="205" width="38" height="61" rx="5" fill="url(#tw)"/>
    <rect x="398" y="205" width="17" height="26" rx="2" fill="url(#sheen)" opacity="0.75"/>
    <line x1="434" y1="205" x2="434" y2="266" stroke="rgba(180,160,120,0.18)" stroke-width="1"/>

    <!-- Dente 8 -->
    <rect x="436" y="209" width="34" height="57" rx="4" fill="url(#tw)"/>
    <rect x="438" y="209" width="15" height="24" rx="2" fill="url(#sheen)" opacity="0.7"/>
    <line x1="470" y1="209" x2="470" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 9 -->
    <rect x="472" y="209" width="34" height="57" rx="4" fill="url(#tw)"/>
    <rect x="474" y="209" width="15" height="24" rx="2" fill="url(#sheen)" opacity="0.7"/>
    <line x1="506" y1="209" x2="506" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Dente 10 -->
    <rect x="508" y="214" width="30" height="52" rx="4" fill="url(#tw)"/>
    <rect x="510" y="214" width="13" height="22" rx="2" fill="url(#sheen)" opacity="0.65"/>
    <line x1="538" y1="214" x2="538" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Pré-molar 1 -->
    <rect x="540" y="216" width="28" height="50" rx="4" fill="url(#tw)"/>
    <rect x="542" y="216" width="12" height="20" rx="2" fill="url(#sheen)" opacity="0.6"/>
    <line x1="568" y1="216" x2="568" y2="266" stroke="rgba(180,160,120,0.2)" stroke-width="1"/>

    <!-- Pré-molar 2 -->
    <rect x="570" y="218" width="26" height="48" rx="4" fill="url(#tw)"/>
    <rect x="572" y="218" width="11" height="19" rx="2" fill="url(#sheen)" opacity="0.55"/>

    <!-- Brilho global nos dentes -->
    <ellipse cx="400" cy="220" rx="210" ry="11" fill="rgba(255,255,255,0.07)" filter="url(#blur2)"/>
  </g>

  <!-- Sombra -->
  <ellipse cx="400" cy="268" rx="228" ry="14" fill="rgba(0,0,0,0.38)"/>

  <!-- Linha dourada premium -->
  <line x1="168" y1="267" x2="596" y2="267" stroke="rgba(184,148,90,0.1)" stroke-width="1"/>

  <!-- Ícone de aprovação -->
  <circle cx="720" cy="60" r="28" fill="rgba(184,148,90,0.15)" stroke="rgba(184,148,90,0.35)" stroke-width="1.5"/>
  <path d="M707 60 L716 70 L733 50" stroke="#B8945A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texto -->
  <rect x="50" y="420" width="700" height="52" rx="4" fill="rgba(184,148,90,0.06)" stroke="rgba(184,148,90,0.18)" stroke-width="1"/>
  <text x="400" y="441" font-family="Montserrat, sans-serif" font-size="10" fill="#B8945A" text-anchor="middle" letter-spacing="2">RESULTADO FINAL</text>
  <text x="400" y="460" font-family="Montserrat, sans-serif" font-size="12" fill="#C4C0B4" text-anchor="middle">Diastema fechado com 6 lentes ultrafinas — sem desgaste, sem dor, resultado natural</text>
</svg>
