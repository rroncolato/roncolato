<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141010"/>
      <stop offset="100%" stop-color="#060404"/>
    </radialGradient>
    <radialGradient id="t_worn" cx="40%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#b8a070"/>
      <stop offset="60%" stop-color="#907040"/>
      <stop offset="100%" stop-color="#6a4f20"/>
    </radialGradient>
    <radialGradient id="t_dark" cx="40%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#907565"/>
      <stop offset="70%" stop-color="#6a5040"/>
      <stop offset="100%" stop-color="#4a3520"/>
    </radialGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.65)"/></filter>
    <filter id="b2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <radialGradient id="vig" cx="50%" cy="50%" r="65%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.8)"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#vig)"/>

  <rect x="20" y="20" width="90" height="30" rx="2" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="65" y="39" font-family="Montserrat, sans-serif" font-size="11" fill="#7A7A72" text-anchor="middle" letter-spacing="3">ANTES</text>

  <!-- Boca -->
  <path d="M130 225 Q400 185 670 225 Q640 305 400 325 Q160 305 130 225Z" fill="#6a1e18" filter="url(#sh)"/>
  <path d="M130 225 Q400 200 670 225" fill="#8a2a22"/>
  <ellipse cx="400" cy="268" rx="228" ry="56" fill="#080303"/>

  <!-- Gengiva com inflamação/recessão -->
  <ellipse cx="400" cy="230" rx="222" ry="28" fill="#c03555"/>
  <!-- manchas de recessão -->
  <ellipse cx="300" cy="240" rx="20" ry="8" fill="#a02545" opacity="0.7"/>
  <ellipse cx="450" cy="238" rx="18" ry="7" fill="#a02545" opacity="0.7"/>

  <!-- Dentes desgastados/manchados posterior -->
  <!-- Lateral esquerda — coroa antiga escurecida -->
  <path d="M182 225 Q198 218 218 222 L220 278 Q200 283 180 279 Z" fill="url(#t_dark)"/>
  <ellipse cx="200" cy="253" rx="8" ry="12" fill="rgba(30,10,2,0.6)"/>

  <path d="M222 221 Q238 215 258 219 L260 278 Q240 283 220 279 Z" fill="url(#t_worn)"/>
  <path d="M228 226 Q240 221 255 224" stroke="#4a2808" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- incisivo desgastado (borda incisal reta/achatada = bruxismo) -->
  <path d="M262 219 Q278 213 298 217 L300 278 Q280 283 260 279 Z" fill="url(#t_worn)"/>
  <path d="M262 217 Q280 217 300 217" stroke="#7a5525" stroke-width="2.5" fill="none"/><!-- borda plana -->

  <!-- incisivo central esquerdo (desgastado, mais curto) -->
  <path d="M302 217 Q318 212 338 215 L340 278 Q320 283 300 279 Z" fill="url(#t_worn)"/>
  <!-- desgaste severo no topo -->
  <path d="M302 215 Q320 215 340 215" stroke="#6a4515" stroke-width="2" fill="none"/>

  <!-- incisivo central direito -->
  <path d="M342 215 Q358 211 378 214 L380 278 Q360 283 340 279 Z" fill="url(#t_worn)"/>
  <path d="M342 214 Q360 214 380 214" stroke="#6a4515" stroke-width="2" fill="none"/>
  <ellipse cx="360" cy="245" rx="5" ry="9" fill="rgba(50,25,5,0.4)"/>

  <!-- incisivo lateral direito -->
  <path d="M382 214 Q398 210 418 213 L420 278 Q400 283 380 279 Z" fill="url(#t_worn)"/>
  <path d="M382 212 Q400 212 420 212" stroke="#5a3510" stroke-width="2" fill="none"/>

  <!-- canino - mais alto, menos desgastado -->
  <path d="M422 213 Q438 208 457 212 L459 278 Q440 283 420 279 Z" fill="url(#t_worn)"/>

  <!-- pré-molar -->
  <path d="M461 213 Q476 209 494 213 L496 278 Q478 283 459 279 Z" fill="url(#t_dark)"/>
  <ellipse cx="476" cy="248" rx="7" ry="11" fill="rgba(30,12,2,0.55)"/>

  <!-- molar -->
  <path d="M498 215 Q513 211 530 215 L531 278 Q514 283 496 279 Z" fill="url(#t_worn)"/>
  <path d="M498 213 Q514 213 531 213" stroke="#6a4515" stroke-width="2" fill="none"/>

  <!-- molar 2 -->
  <path d="M534 218 Q547 215 562 219 L563 278 Q547 283 532 279 Z" fill="url(#t_dark)"/>
  <ellipse cx="547" cy="252" rx="6" ry="10" fill="rgba(25,8,2,0.6)"/>
  <!-- restauração antiga aparente -->
  <rect x="538" y="235" width="18" height="14" rx="2" fill="#3a2510" opacity="0.7"/>

  <!-- Marcações de desgaste -->
  <text x="340" y="165" font-family="Montserrat, sans-serif" font-size="9" fill="rgba(220,100,80,0.8)" text-anchor="middle" letter-spacing="1">DESGASTE INCISAL</text>
  <line x1="302" y1="170" x2="302" y2="210" stroke="rgba(220,80,60,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="170" x2="380" y2="207" stroke="rgba(220,80,60,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <ellipse cx="400" cy="279" rx="208" ry="13" fill="rgba(0,0,0,0.4)"/>

  <rect x="50" y="420" width="700" height="52" rx="4" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="400" y="441" font-family="Montserrat, sans-serif" font-size="10" fill="#7A7A72" text-anchor="middle" letter-spacing="2">SITUAÇÃO INICIAL</text>
  <text x="400" y="460" font-family="Montserrat, sans-serif" font-size="12" fill="#C4C0B4" text-anchor="middle">Desgaste severo por bruxismo e restaurações antigas — reabilitação com E.max</text>
</svg>
