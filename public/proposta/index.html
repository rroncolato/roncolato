<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propostas — Roncolato Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C0C0C;
            color: #FFFFFF;
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* LOGIN SCREEN */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .login-screen.hidden {
            display: none;
        }

        .logo {
            width: 100%;
            max-width: 250px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .login-title {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            letter-spacing: -1px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #7A7A7A;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7A7A7A;
            font-weight: 600;
        }

        .form-group input {
            padding: 14px 16px;
            background: #141414;
            border: 1px solid rgba(255,255,255,0.07);
            color: #FFFFFF;
            font-family: 'Jost', sans-serif;
            font-size: 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #F5C518;
            background: #1a1a1a;
        }

        .form-group input::placeholder {
            color: #3A3A3A;
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            background: #F5C518;
            color: #0C0C0C;
            border: none;
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .error {
            color: #FF6B6B;
            font-size: 12px;
            text-align: center;
        }

        /* LIST SCREEN */
        .list-screen {
            display: none;
            flex-direction: column;
            gap: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .list-screen.visible {
            display: flex;
            opacity: 1;
        }

        .list-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .list-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .list-subtitle {
            font-size: 14px;
            color: #7A7A7A;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .propostas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .proposta-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.07);
            padding: 24px;
            border-radius: 4px;
            text-decoration: none;
            color: #FFFFFF;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .proposta-card:hover {
            border-color: #F5C518;
            background: #1a1a1a;
            transform: translateY(-4px);
        }

        .proposta-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .proposta-desc {
            font-size: 13px;
            color: #7A7A7A;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .proposta-link {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #F5C518;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .proposta-card:hover .proposta-link {
            gap: 8px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #7A7A7A;
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .logout-btn:hover {
            border-color: #F5C518;
            color: #F5C518;
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .login-title {
                font-size: 24px;
            }

            .list-title {
                font-size: 28px;
            }

            .propostas-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <div class="login-screen" id="loginScreen">
            <div class="logo">
                <img src="/assets/IMG/roncolato-branco-horizontal.png" alt="Roncolato">
            </div>
            <h1 class="login-title">Propostas</h1>
            <p class="login-subtitle">Acesso Restrito</p>

            <div style="width: 100%;">
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Digite a senha"
                        autocomplete="off"
                    >
                </div>
                <div id="error" class="error" style="margin-top: 10px;"></div>
                <button class="btn" onclick="checkPassword()" style="margin-top: 16px;">Acessar</button>
            </div>
        </div>

        <!-- LIST -->
        <div class="list-screen" id="listScreen">
            <div class="list-header">
                <h1 class="list-title">Propostas</h1>
                <p class="list-subtitle">Acesso Restrito</p>
            </div>

            <div class="propostas-grid" id="propostas"></div>

            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <script>
        const PASSWORD = 'rroncolato';
        const STORAGE_KEY = 'proposta_auth';

        // Lista de propostas disponíveis
        const propostas = [
            {
                id: 'rg-entulhos',
                name: 'RG Entulhos',
                desc: 'Usina de Reciclagem - Proposta Estratégica'
            },
            {
                id: 'taruma',
                name: 'Taruma',
                desc: 'Proposta Comercial'
            },
            {
                id: 'bemfast',
                name: 'BemFast',
                desc: 'Proposta Comercial'
            },
            {
                id: 'bem-fast',
                name: 'BemFast (Alt)',
                desc: 'Proposta Comercial'
            },
            {
                id: 'raro',
                name: 'Raro',
                desc: 'Proposta Comercial'
            },
            {
                id: 'renata',
                name: 'Renata Rosa',
                desc: 'Proposta Comercial'
            },
            {
                id: 'unica',
                name: 'Unica Contábil',
                desc: 'Proposta Comercial'
            },
            {
                id: 'fotografia-corporativa',
                name: 'Fotografia Corporativa',
                desc: 'Proposta de Serviço'
            }
        ];

        function checkPassword() {
            const input = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (input === PASSWORD) {
                localStorage.setItem(STORAGE_KEY, 'true');
                errorDiv.textContent = '';
                showPropostas();
            } else {
                errorDiv.textContent = 'Senha incorreta. Tente novamente.';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('listScreen').classList.remove('visible');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }

        function showPropostas() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('listScreen').classList.add('visible');

            const grid = document.getElementById('propostas');
            grid.innerHTML = propostas.map(p => `
                <a href="/proposta/${p.id}" class="proposta-card">
                    <div>
                        <div class="proposta-name">${p.name}</div>
                        <div class="proposta-desc">${p.desc}</div>
                    </div>
                    <div class="proposta-link">Acessar →</div>
                </a>
            `).join('');
        }

        // Check if already authenticated
        window.addEventListener('load', () => {
            if (localStorage.getItem(STORAGE_KEY) === 'true') {
                showPropostas();
            } else {
                document.getElementById('password').focus();
            }
        });

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginScreen').classList.length === 0) {
                checkPassword();
            }
        });
    </script>
</body>
</html>
